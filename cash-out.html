<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>


    <title>Document</title><link rel="stylesheet" href="output.css">

    <header class="max-w-[450px] mx-auto p-4 flex justify-between">

        <i class="fa-solid fa-clock"></i>
        <div>
        <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-three-quarters"></i>
        </div>
      
    </header>
</head>
<body>
      <section class="max-w-[450px] mx-auto p-4 ">
            <div class="flex" >
                <img src="assets/logo.png" class="w-[60px] h-[48px]">
                <div class="w-[110px] h-[47px] ml-[12px]"> <h1>$45000</h1>
                <h1>Available Balance</h1></div>
                 <button class="py-[10px] pl-6 pr-7 ml-[128px] border border-gray-400 text-[14px] text-[#080808]">Log out</button>
               
               
            </div>
   
          
        </section>
 <section class="max-w-[450px] mx-auto p-4">
    <span class="text-2xl mt-[32px] mb-5 font-bold text-black">Welcome to Pay</span><span class="text-purple-700 text-2xl font-bold">oo</span>
    <p class="w-[402px] h-[68px] text-xl text-gray-400 mb-[24px] mt-[10px]">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>
    
    <div class="grid grid-cols-3 gap-3 mb-[29px]">

    
      <!-- Card -->
      <div onclick="goToAddMoney()"  class="bg-white rounded-xl p-3 flex flex-col items-center shadow-sm">
        <img src="assets/opt-1.png" class="w-8 mb-2">
        <p id="add-money" class="text-sm">Add Money</p>
      </div>

      <div onclick="goToCashOut()" class="bg-white rounded-xl p-3 flex flex-col items-center shadow-sm">
        <img src="assets/opt-2.png" class="w-8 mb-2">
        <p class="text-sm">Cashout</p>
      </div>

      <div onclick="gotoTransfermoney()"class="bg-white rounded-xl p-3 flex flex-col items-center shadow-sm">
        <img src="assets/opt-3.png" class="w-8 mb-2">
        <p class="text-sm">Transfer</p>
      </div>

      <div onclick="gotoBonus()" class="bg-white rounded-xl p-3 flex flex-col items-center shadow-sm">
        <img src="assets/opt-4.png" class="w-8 mb-2">
        <p class="text-sm">Get Bonus</p>
      </div>

      <div onclick="gotoPaybill()"class="bg-white rounded-xl p-3 flex flex-col items-center shadow-sm">
        <img src="assets/opt-5.png" class="w-8 mb-2">
        <p class="text-sm">Pay Bill</p>
      </div>

      <div onclick="gotoTransections()" class="bg-white rounded-xl p-3 flex flex-col items-center shadow-sm">
        <img src="assets/opt-6.png" class="w-8 mb-2">
        <p class="text-sm">Transactions</p>
      </div>

    </div>

    </section>
    <section class="max-w-[450px] mx-auto p-4" >
        <h1 class="font-bold text-2xl text-black mb-[16px]"> Cash out </h1>

        <div >
                 <form id="cashoutform">
       
        <label for="agent-num" class=" text-[16px] font-medium text-[#080808]">Agent Number</label><br>
        <input type="text" id="bank" class="w-[338px] h-[52px] border-2 border-gray-400 bg-[#F4F5F7] rounded-xl pl-3 mt-3 " placeholder="Enter 11 digit number" ><br><br>

      
        <label for="amnt" class="mb-[12px] text-[16px] font-medium text-[#080808]" >Amount</label><br>
        <input type="number" id="amnt" class="w-[338px] h-[52px] border-2 border-gray-400 bg-[#F4F5F7] rounded-xl pl-3 mt-3" placeholder="Enter amount to withdraw" ><br><br>

       
         <label for="Pin Number" class="mb-[12px] text-[16px] font-medium text-[#080808]" >Pin Number</label><br>
        <input type="number" id="pin-num" class="w-[338px] h-[52px] border-2 border-gray-400 bg-[#F4F5F7] rounded-xl pl-3 mt-3" placeholder="Enter 4 digit pin number" ><br><br>


   
        <button type="submit" class="border-2 rounded-2xl w-[388px] h-[53px] bg-[#3B25C1] text-white font-semibold">Withdraw Money</button>
    </form>
        </div>

    </section>
     <script src="script.js" defer></script>

    
</body>
</html>
